name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  # ── Fast gate: unit tests + coverage (runs first) ──────────────────
  # If this fails, no point running the full matrix or packaging.
  unit_coverage:
    name: Unit tests + coverage (PR)
    permissions:
      contents: read
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v4.2.0
      with:
        fetch-depth: 0
    - name: Setup Node.js
      uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
      with:
        node-version: '20.x'
        cache: 'npm'
    - name: Install dependencies
      run: npm ci
    - name: Compile TypeScript
      run: npm run compile:tsc
    - name: Run unit tests + enforce coverage
      run: xvfb-run -a npm run test:coverage

  # ── Build matrix: OS × Node version (only after unit tests pass) ───
  build:
    needs: unit_coverage
    permissions:
      contents: read
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        node-version: [20.x, 22.x]
    
    runs-on: ${{ matrix.os }}
    
    steps:
    - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v4.2.0
    
    - name: Setup Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'
    
    - name: Install dependencies
      run: npm ci
    
    - name: Run lint
      run: npm run lint
      continue-on-error: true
    
    - name: Compile TypeScript
      run: npm run compile:tsc
    
    - name: Run tests (Ubuntu)
      if: runner.os == 'Linux'
      run: xvfb-run -a npm test
    
    - name: Run tests (Windows/macOS)
      if: runner.os != 'Linux'
      run: npm test

  package:
    name: Package VSIX
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
    
    steps:
    - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v4.2.0
    
    - name: Setup Node.js
      uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
      with:
        node-version: '20.x'
        cache: 'npm'
    
    - name: Install dependencies
      run: npm ci
    
    - name: Package VSIX
      run: npx @vscode/vsce package

    - name: Upload VSIX artifact
      uses: actions/upload-artifact@b4b15b8c7c6ac21ea08fcf65892d2ee8f75cf882 # v4.4.3
      with:
        name: vsix-package
        path: '*.vsix'
        retention-days: 30

  security:
    permissions:
      contents: read
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v4.2.0
    
    - name: Setup Node.js
      uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
      with:
        node-version: '20.x'
        cache: 'npm'
    
    - name: Install dependencies
      run: npm ci
    
    - name: Run npm audit
      run: npm audit --audit-level=moderate
      continue-on-error: true
    
    - name: Check for outdated dependencies
      run: npm outdated
      continue-on-error: true

  # Auto-create pre-release on push to main
  prerelease:
    name: Create Pre-release
    needs: [build, package]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: write
    
    steps:
    - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v4.2.0
      with:
        fetch-depth: 0
    
    - name: Download VSIX artifact
      uses: actions/download-artifact@fa0a91b85d4f404e444e00e005971372dc801d16 # v4.1.8
      with:
        name: vsix-package
    
    - name: Get version and generate tag
      id: version
      run: |
        VERSION=$(node -p "require('./package.json').version")
        SHORT_SHA=$(git rev-parse --short HEAD)
        TIMESTAMP=$(date +%Y%m%d%H%M%S)
        TAG="v${VERSION}-pre.${TIMESTAMP}.${SHORT_SHA}"
        echo "version=${VERSION}" >> $GITHUB_OUTPUT
        echo "tag=${TAG}" >> $GITHUB_OUTPUT
        echo "Generated pre-release tag: ${TAG}"
    
    - name: Create pre-release tag
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git tag ${{ steps.version.outputs.tag }}
        git push origin ${{ steps.version.outputs.tag }}
    
    - name: Create GitHub Pre-release
      uses: softprops/action-gh-release@01570a1f39cb168c169c802c3bceb9e93fb10974 # v2.1.0
      with:
        tag_name: ${{ steps.version.outputs.tag }}
        name: Pre-release ${{ steps.version.outputs.tag }}
        files: '*.vsix'
        prerelease: true
        generate_release_notes: true
